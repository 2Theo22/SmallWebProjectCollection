<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <title>Random Number Generator</title>
</head>
<body>
    <h1>Random Number</h1>
    <p>Enter Numbers to generate a random Number</p>
    <label for="minNumber">Min: </label>
    <input type="Number" id="minNumber" placeholder="1">
    <label for="maxNumber">Max: </label>
    <input type="Number" id="maxNumber" placeholder="100">
    <button onclick="generate()">Generate</button>
    <label for="result">Result:</label>
    <input type="text" id="result" placeholder="0" readonly>


    <script src="index.js"></script>
</body>
</html>
